# Render Blueprint for WhatsApp Bot
# Deploy as a background worker service

services:
  - type: worker
    name: whatsapp-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: BOT_PREFIX
        value: "."
      - key: OWNER_NUMBER
        sync: false
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
